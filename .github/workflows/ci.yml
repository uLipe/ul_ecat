# Build and test on every push and pull request (Linux).
name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build build-essential python3-pytest

      - name: Configure
        run: >
          cmake -S . -B build -G Ninja
          -DUL_ECAT_BUILD_TESTS=ON
          -DUL_ECAT_BUILD_SHARED=ON
          -DUL_ECAT_BUILD_TOOLS=OFF

      - name: Build
        run: cmake --build build --parallel $(nproc)

      - name: CTest
        working-directory: build
        run: ctest --output-on-failure

      # Real libul_ecat master (AF_PACKET) + Python ecat_slave_sim on a veth pair; needs root.
      - name: E2E L2 — master scan + ecat_slave_sim
        run: |
          sudo env UL_ECAT_VERBOSE=1 UL_ECAT_LIB="$PWD/build/libul_ecat.so" \
            python3 scripts/run_e2e_l2_scan.py
