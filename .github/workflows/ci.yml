# Build and test on every push and pull request (Linux).
name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build build-essential python3-pytest

      - name: Configure
        run: >
          cmake -S . -B build -G Ninja
          -DUL_ECAT_BUILD_TESTS=ON
          -DUL_ECAT_BUILD_SHARED=ON
          -DUL_ECAT_BUILD_TOOLS=OFF

      - name: Build
        run: cmake --build build --parallel $(nproc)

      # CTest: ul_ecat_gtest, ul_ecat_slave_gtest, ul_ecat_slave_controller_gtest (HAL LAN9252 mock), ul_ecat_pytest
      - name: CTest
        working-directory: build
        run: ctest --output-on-failure

      # Real libul_ecat master (AF_PACKET) + Python ecat_slave_sim on a veth pair; needs root.
      - name: E2E L2 — master scan + ecat_slave_sim
        run: |
          sudo env UL_ECAT_VERBOSE=1 UL_ECAT_LIB="$PWD/build/libul_ecat.so" \
            python3 scripts/run_e2e_l2_scan.py

  # Zephyr: compile master (ul_ecat_scan, native_sim) + slave (ul_ecat_servo, ESP32-DevKitC WROOM).
  zephyr-samples:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install host packages (Zephyr native_sim + SDK)
        run: |
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build wget gperf device-tree-compiler git \
            gcc-multilib g++-multilib libc6-dev-i386 \
            python3-pip python3-setuptools python3-wheel python3-venv

      - name: Cache Zephyr CI workspace
        uses: actions/cache@v4
        with:
          path: .zephyr-ci
          key: zephyr-ci-${{ runner.os }}-v3.7.2-${{ hashFiles('scripts/ci_build_zephyr_samples.sh') }}

      - name: Build Zephyr samples
        env:
          ZEPHYR_REV: v3.7.2
          ZEPHYR_CI_HOME: ${{ github.workspace }}/.zephyr-ci
        run: bash scripts/ci_build_zephyr_samples.sh

  # NuttX: full board build is out of scope; verify integration files exist.
  nuttx-integration:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify NuttX integration files
        run: bash scripts/ci_verify_nuttx_integration.sh
