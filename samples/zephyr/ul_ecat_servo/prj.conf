# ul_ecat servo slave sample — LAN9252 SPI HAL + PDO loop (no Ethernet master stack)

CONFIG_MAIN_STACK_SIZE=4096
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048

CONFIG_PRINTK=y
CONFIG_LOG=y
CONFIG_LOG_MODE_MINIMAL=y

# SPI + GPIO (CS) — required by UL_ECAT_LAN9252_HAL
CONFIG_SPI=y
CONFIG_GPIO=y

CONFIG_UL_ECAT=y
CONFIG_UL_ECAT_SLAVE=y
CONFIG_UL_ECAT_LAN9252_HAL=y
